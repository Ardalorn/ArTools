<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1c1815">
<meta name="description" content="Tools by Ardalorn.">
<meta name="author" content="Ardalorn">
<title>Ardalorn — Tools</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Source+Code+Pro:wght@400;600&display=swap');
  :root{
    --charcoal-950:#14110e;
    --charcoal-900:#1c1815;
    --charcoal-800:#26211c;
    --charcoal-700:#322c25;
    --parchment:#f0e6d4;
    --parchment-dim:#a89b85;
    --brass:#d49e5a;
    --brass-bright:#e8b97a;
    --line:#3a332b;
    --radius:14px;
    --serif: "Source Serif 4", "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --mono: "Source Code Pro", "JetBrains Mono", "SF Mono", Consolas, Menlo, monospace;
    --sans: "Source Sans 3", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
  body{
    background:var(--charcoal-950);color:var(--parchment);font-family:var(--sans);
    font-size:16px;line-height:1.5;min-height:100dvh;-webkit-font-smoothing:antialiased;
    padding-bottom:env(safe-area-inset-bottom,0);
  }
  ::selection{background:var(--brass);color:var(--charcoal-950);}
  a{color:inherit;}
  main{max-width:680px;margin:0 auto;padding:56px 20px 64px;}

  .eyebrow{
    font-family:var(--mono);letter-spacing:.14em;text-transform:uppercase;font-size:11px;
    color:var(--brass);border-bottom:1px solid var(--line);padding-bottom:12px;margin-bottom:20px;
  }
  h1{
    font-family:var(--serif);font-style:italic;font-weight:400;
    font-size:clamp(32px,7vw,44px);line-height:1.15;margin:0 0 8px;color:var(--parchment);
  }
  .lede{color:var(--parchment-dim);font-size:15px;margin:0 0 44px;max-width:52ch;}

  .shelf{
    list-style:none;display:grid;
    grid-template-columns:repeat(auto-fill, minmax(128px, 1fr));
    gap:14px;
  }
  .tool{
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    background:var(--charcoal-900);border:1px solid var(--line);border-radius:var(--radius);
    padding:26px 12px;text-decoration:none;text-align:center;
    -webkit-touch-callout:none;-webkit-user-select:none;user-select:none;
    transition:border-color .15s ease, transform .15s ease, background .15s ease;
  }
  .tool:hover, .tool:focus-visible{
    border-color:var(--tool-color, var(--brass));transform:translateY(-2px);background:var(--charcoal-800);
  }
  .tool:focus-visible{outline:2px solid var(--tool-color, var(--brass));outline-offset:2px;}
  .tool-icon{
    width:30px;height:30px;color:var(--tool-color, var(--brass));
    transition:filter .15s ease;
  }
  .tool:hover .tool-icon, .tool:focus-visible .tool-icon{filter:brightness(1.25);}
  .tool-icon svg{width:100%;height:100%;display:block;}
  .tool-name{
    font-family:var(--serif);font-size:15.5px;color:var(--parchment);line-height:1.25;
  }

  .tooltip{
    position:fixed;z-index:10;pointer-events:none;
    background:var(--charcoal-800);border:1px solid var(--line);border-radius:9px;
    padding:8px 12px;max-width:220px;
    font-fam
    );
    box-shadow:0 8px 22px rgba(0,0,0,.35);
    opacity:0;transform:translateY(4px) scale(.97);
    transition:opacity .12s ease, transform .12s ease;
  }
  .tooltip.is-visible{opacity:1;transform:translateY(0) scale(1);}
  .tooltip::after{
    content:"";position:absolute;width:8px;height:8px;
    background:var(--charcoal-800);border-right:1px solid var(--line);border-bottom:1px solid var(--line);
    transform:rotate(45deg);
  }
  .tooltip[data-pos="above"]::after{bottom:-5px;left:50%;margin-left:-4px;}
  .tooltip[data-pos="below"]::after{top:-5px;left:50%;margin-left:-4px;transform:rotate(225deg);}

  @media (prefers-reduced-motion: reduce){
    .tooltip{transition:none;}
  }

  footer{
    max-width:680px;margin:0 auto;padding:44px 20px 40px;
    font-family:var(--mono);font-size:11px;color:var(--parchment-dim);
    letter-spacing:.04em;
  }

  @media (prefers-reduced-motion: reduce){
    .tool{transition:none;}
  }
</style>
</head>
<body>
<main>
  <div class="eyebrow">Ardalorn</div>
  <h1>Tools, kept in one place</h1>
  <p class="lede">A shelf of single-file apps. Each one runs entirely in your browser, no accounts, no tracking.</p>

  <ul class="shelf">
    <li>
      <a class="tool" href="ArPlan/" aria-label="ArPlan" data-desc="Weekly itinerary, meal planning, and pantry tracker." style="--tool-color:var(--brass)">
        <span class="tool-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4.5" width="18" height="16" rx="2"/>
            <path d="M3 9.5h18"/>
            <path d="M8 2.5v4M16 2.5v4"/>
            <path d="M7.5 13.5h3M7.5 17h6"/>
          </svg>
        </span>
        <span class="tool-name">ArPlan</span>
      </a>
    </li>
    <li>
      <a class="tool" href="ArCast/" aria-label="ArCast" data-desc="A calm, accessible UK weather dashboard with moon phase tracking." style="--tool-color:#a5b4fc">
        <span class="tool-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.5 18a4 4 0 0 0 0-8 5.5 5.5 0 0 0-10.6-1.6A4.5 4.5 0 0 0 7.5 18h10z"/>
            <path d="M18.5 6.5a5 5 0 0 1 1.2 3"/>
          </svg>
        </span>
        <span class="tool-name">ArCast</span>
      </a>
    </li>
    <li>
      <a class="tool" href="ArCanvas/" aria-label="ArCanvas" data-desc="A distraction-free drawing experience for children.">
        <span class="tool-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 20l1-4.2L15.6 5.2a1.5 1.5 0 0 1 2.1 0l1.1 1.1a1.5 1.5 0 0 1 0 2.1L8.2 19 4 20z" stroke="#c98b7a" fill="none"/>
            <path d="M13.8 6.9l3.3 3.3" stroke="#d1b47e" fill="none"/>
            <path d="M4 20l1-4.2 2 2z" stroke="#8fa882" fill="#8fa882" fill-opacity=".35"/>
          </svg>
        </span>
        <span class="tool-name">ArCanvas</span>
      </a>
    </li>
    <li>
      <a class="tool" href="ArHar/" aria-label="ArHar" data-desc="A network log (HAR file) inspector." style="--tool-color:#dba361">
        <span class="tool-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 13h3l2 6 4-14 2 8h4"/>
            <path d="M18 13h3"/>
          </svg>
        </span>
        <span class="tool-name">ArHar</span>
      </a>
    </li>
    <li>
      <a class="tool" href="ArCom/" aria-label="ArCom" data-desc="A zero-dependency comic library and reader for your local collection, with CVD support." style="--tool-color:#ff4d4d">
        <span class="tool-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M10 3v7"/>
            <path d="M3 10h18"/>
            <path d="M13 10v11"/>
          </svg>
        </span>
        <span class="tool-name">ArCom</span>
      </a>
    </li>
    <!-- Add further tools here, one <li> per entry — icon svg + tool-name. Set style="--tool-color:#hex" from that app's :root palette, and data-desc="..." for the tooltip -->
  </ul>
</main>
<footer>Ardalorn · built with plain HTML, CSS, and JS</footer>
<script>
(function(){
  var tooltip = document.createElement('div');
  tooltip.className = 'tooltip';
  tooltip.setAttribute('role', 'tooltip');
  tooltip.id = 'shelf-tooltip';
  document.body.appendChild(tooltip);

  var tools = document.querySelectorAll('.tool[data-desc]');
  var activeTool = null;
  var showTimer = null;
  var longPressTimer = null;
  var isTouch = false;

  function position(el){
    var r = el.getBoundingClientRect();
    var vh = window.innerHeight;
    var above = r.top > vh / 2;
    tooltip.setAttribute('data-pos', above ? 'above' : 'below');
    tooltip.style.visibility = 'hidden';
    tooltip.classList.add('is-visible');
    var tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
    var left = Math.min(Math.max(8, r.left + r.width / 2 - tw / 2), window.innerWidth - tw - 8);
    var top = above ? (r.top - th - 10) : (r.bottom + 10);
    tooltip.style.left = left + 'px';
    tooltip.style.top = top + 'px';
    tooltip.style.visibility = '';
  }

  function show(el){
    tooltip.textContent = el.getAttribute('data-desc');
    activeTool = el;
    el.setAttribute('aria-describedby', 'shelf-tooltip');
    position(el);
    tooltip.classList.add('is-visible');
  }

  function hide(){
    tooltip.classList.remove('is-visible');
    if (activeTool) activeTool.removeAttribute('aria-describedby');
    activeTool = null;
  }

  tools.forEach(function(el){
    el.addEventListener('contextmenu', function(e){ e.preventDefault(); });

    // Desktop hover — small delay so it doesn't flash on quick mouse pass-through
    el.addEventListener('mouseenter', function(){
      if (isTouch) return;
      clearTimeout(showTimer);
      showTimer = setTimeout(function(){ show(el); }, 350);
    });
    el.addEventListener('mouseleave', function(){
      clearTimeout(showTimer);
      hide();
    });

    // Keyboard focus — show immediately, no delay
    el.addEventListener('focus', function(){ show(el); });
    el.addEventListener('blur', hide);

    // Touch — long-press (500ms) shows tooltip and suppresses the click-through navigation;
    // a normal tap still navigates as usual.
    el.addEventListener('touchstart', function(){
      isTouch = true;
      var target = el;
      longPressTimer = setTimeout(function(){
        show(target);
        target.dataset.longPressed = 'true';
        if (navigator.vibrate) navigator.vibrate(8);
      }, 500);
    }, {passive:true});

    el.addEventListener('touchend', function(){
      clearTimeout(longPressTimer);
    });
    el.addEventListener('touchmove', function(){
      clearTimeout(longPressTimer);
    }, {passive:true});

    el.addEventListener('click', function(e){
      if (el.dataset.longPressed === 'true'){
        e.preventDefault();
        delete el.dataset.longPressed;
        setTimeout(hide, 1800);
      }
    });
  });

  document.addEventListener('touchstart', function(e){
    if (activeTool && !activeTool.contains(e.target)) hide();
  }, {passive:true});

  window.addEventListener('scroll', hide, {passive:true});
  window.addEventListener('resize', function(){
    if (activeTool) position(activeTool);
  });
})();
</script>
</body>
</html>
