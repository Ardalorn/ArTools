<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="ArCast — a calm, accessible weather dashboard">
    <meta name="theme-color" content="#16161a">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src https://api.open-meteo.com https://api.postcodes.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com;">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://api.open-meteo.com">
    <link rel="preconnect" href="https://api.postcodes.io">
    <title>ArCast</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌤️</text></svg>">
    <link rel="canonical" href="https://ardalorn.github.io/ArTools/ArCast/">
    <meta property="og:title" content="ArCast">
    <meta property="og:description" content="A calm, accessible weather dashboard.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ardalorn.github.io/ArTools/ArCast/">
    <meta property="og:image" content="https://ardalorn.github.io/ArTools/ArCast/og-image.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="ArCast">
    <meta name="twitter:description" content="A calm, accessible weather dashboard.">

    <style>
        :root {
            --bg: #16161a;
            --surface: #1f1f2e;
            --surface-soft: rgba(255, 255, 255, 0.03);
            --border-chill: rgba(255, 255, 255, 0.06);
            --text: #f0f0f5;
            --text-secondary: #c5c5d2;
            --text-muted: #9ca3af;
            --primary: #a5b4fc;
            --primary-glow: rgba(165, 180, 252, 0.15);
            --night-glow: rgba(96, 165, 250, 0.08);
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
                scroll-behavior: auto !important;
            }
            .skeleton { animation: none !important; background: var(--surface) !important; }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html {
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
        }
        body {
            font-family: 'Source Sans 3', 'Noto Sans', 'Open Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 24px 16px;
            min-height: 100dvh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: 0.01em;
            word-spacing: 0.02em;
            line-height: 1.6;
        }
        h1 {
            font-family: 'Lato', 'Source Sans 3', sans-serif;
            letter-spacing: +0.02em;
        }
        .hero-temp {
            font-family: 'Lato', 'Source Sans 3', sans-serif;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            contain: layout style paint;
        }
        header {
            margin-bottom: 32px;
            text-align: center;
        }
        .header-title h1 {
            font-size: 32px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: -0.02em;
        }
        .header-title p {
            color: var(--text-secondary);
            margin: 0 0 20px 0;
            font-size: 16px;
        }
        .status-message {
            padding: 12px 20px;
            border-radius: 20px;
            margin: 16px 0;
            display: none;
            font-size: 14px;
            text-align: center;
            will-change: opacity;
            transition: opacity 0.3s ease;
        }
        .status-loading { background: var(--surface-soft); color: var(--primary); }
        .status-error { background: rgba(241, 76, 76, 0.1); color: #f14c4c; }
        .status-offline { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .show { display: block; }
        .controls-wrapper {
            display: flex;
            gap: 10px;
            max-width: 520px;
            margin: 0 auto 24px auto;
            flex-wrap: wrap;
            justify-content: center;
        }
        .search-input {
            flex: 1;
            min-width: 200px;
            background: var(--surface-soft);
            border: 1px solid var(--border-chill);
            color: var(--text);
            padding: 14px 22px;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
        }
        .search-input:focus {
            border-color: var(--primary);
            background: var(--surface);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        .btn {
            background: var(--surface-soft);
            color: var(--text);
            border: 1px solid var(--border-chill);
            padding: 14px 24px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            white-space: nowrap;
            will-change: transform, box-shadow;
        }
        .btn-primary {
            background: var(--primary);
            color: #16161a;
            border-color: var(--primary);
        }
        .btn:hover:not(:disabled) { background: rgba(255,255,255,0.06); }
        .btn-primary:hover:not(:disabled) { opacity: 0.9; background: var(--primary); box-shadow: 0 4px 12px var(--primary-glow); }
        .btn:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,.2);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
            will-change: transform;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #emptyState {
            text-align: center;
            padding: 60px 20px;
            background: var(--surface-soft);
            border-radius: 24px;
            margin-top: 20px;
        }
        #tabsContainer { display: none; }
        #tabsHeader {
            display: flex;
            gap: 10px;
            margin-bottom: 28px;
            overflow-x: auto;
            padding: 4px 0;
            scrollbar-width: none;
            justify-content: flex-start;
            touch-action: pan-x;
        }
        #tabsHeader::-webkit-scrollbar { display: none; }
        .tab-button {
            padding: 10px 18px;
            background: var(--surface-soft);
            border: 1px solid var(--border-chill);
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
            transition: all 0.2s ease;
            will-change: transform, box-shadow;
        }
        .tab-button.active {
            background: var(--primary);
            color: #16161a;
            border-color: var(--primary);
            font-weight: 600;
            box-shadow: 0 4px 12px var(--primary-glow);
        }
        .tab-button:hover:not(.active) { background: rgba(255,255,255,0.06); }
        .tab-button:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .skeleton {
            background: linear-gradient(90deg, var(--surface) 25%, rgba(255,255,255,0.08) 50%, var(--surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
            color: transparent !important;
            border: none !important;
        }
        .skeleton * { visibility: hidden; }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        .cozy-view {
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .cozy-view.is-visible {
            opacity: 1;
            transform: translateY(0);
        }
        /* ── Content Blocks (Nothing.tech methodology, original styling) ── */
        .block {
            padding: 28px 0;
            border-bottom: 1px solid var(--border-chill);
        }
        .block:last-child {
            border-bottom: none;
        }
        .block-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 16px;
            font-weight: 600;
        }
        /* Hero Block */
        .hero-temp {
            font-size: 72px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.03em;
            margin-bottom: 6px;
            color: var(--text);
        }
        .hero-meta {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .hero-meta .divider {
            color: var(--text-muted);
            margin: 0 8px;
        }
        /* Data Rows Block */
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-chill);
        }
        .data-row:last-child {
            border-bottom: none;
        }
        .data-row .label {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .data-row .value {
            font-size: 14px;
            color: var(--text);
            font-weight: 600;
        }
        .data-row .value .at {
            color: var(--text-muted);
            font-weight: 400;
        }
        /* Hourly Block */
        .scroll-track {
            display: flex;
            gap: 0;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 8px;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-x;
            scroll-behavior: smooth;
            scroll-snap-type: x mandatory;
            cursor: grab;
            user-select: none;
            -webkit-user-select: none;
        }
        .scroll-track.dragging {
            cursor: grabbing;
            scroll-snap-type: none;
            scroll-behavior: auto;
        }
        .scroll-track::-webkit-scrollbar { display: none; }
        .hourly-item {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 18px;
            text-align: center;
            transition: background-color 0.2s ease;
            scroll-snap-align: start;
            border-right: 1px solid var(--border-chill);
            min-width: 76px;
        }
        .hourly-item:last-child {
            border-right: none;
        }
        .hourly-item:hover {
            background: rgba(255,255,255,0.03);
        }
        .hourly-item.is-current {
            background: var(--primary-glow);
        }
        .hourly-item .time {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }
        .hourly-item .icon {
            font-size: 24px;
            margin-bottom: 10px;
            line-height: 1;
        }
        .hourly-item .pop {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
            min-height: 14px;
        }
        .hourly-item .pop.wet { color: #60a5fa; }
        .hourly-item .temp {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        @media (max-width: 480px) {
            .controls-wrapper { flex-direction: column; align-items: stretch; }
            .hero-temp { font-size: 56px; }
        }

        /* ── TV / 32-bit Google TV ── */
        html.is-tv { font-size: 18px; }
        html.is-tv body {
            padding: 48px 5%;
            line-height: 1.7;
        }
        html.is-tv .container { max-width: 960px; }
        html.is-tv header { margin-bottom: 48px; }
        html.is-tv .header-title h1 { font-size: 48px; }
        html.is-tv .header-title p { font-size: 20px; }
        html.is-tv .controls-wrapper { gap: 16px; max-width: 640px; }
        html.is-tv .search-input,
        html.is-tv .btn {
            padding: 18px 28px;
            font-size: 18px;
            border-radius: 28px;
        }
        html.is-tv .status-message { font-size: 18px; padding: 16px 28px; border-radius: 24px; }
        html.is-tv #emptyState { padding: 80px 24px; }
        html.is-tv #emptyState p { font-size: 20px; }
        html.is-tv #tabsHeader { gap: 16px; margin-bottom: 40px; }
        html.is-tv .tab-button {
            padding: 14px 24px;
            font-size: 18px;
            border-radius: 24px;
        }
        html.is-tv .block { padding: 36px 0; }
        html.is-tv .block-label { font-size: 14px; margin-bottom: 20px; }
        html.is-tv .hero-temp { font-size: 120px; }
        html.is-tv .hero-meta { font-size: 18px; }
        html.is-tv .data-row { padding: 14px 0; }
        html.is-tv .data-row .label,
        html.is-tv .data-row .value { font-size: 18px; }
        html.is-tv .hourly-item {
            min-width: 110px;
            padding: 22px 24px;
        }
        html.is-tv .hourly-item .time { font-size: 16px; margin-bottom: 14px; }
        html.is-tv .hourly-item .icon { font-size: 32px; margin-bottom: 14px; }
        html.is-tv .hourly-item .pop { font-size: 14px; min-height: 18px; }
        html.is-tv .hourly-item .temp { font-size: 20px; }
        html.is-tv .scroll-track {
            cursor: default;
            touch-action: auto;
            scroll-snap-type: none;
        }
        html.is-tv .moon-visual { width: 96px; height: 96px; }
        html.is-tv .moon-phase-name { font-size: 22px; }
        html.is-tv .moon-illumination,
        html.is-tv .moon-age { font-size: 16px; }
        html.is-tv :focus-visible {
            outline: 4px solid var(--primary);
            outline-offset: 6px;
            box-shadow: 0 0 0 10px var(--primary-glow);
            border-radius: 8px;
        }
        html.is-tv .tab-button:focus-visible { border-radius: 24px; }
        html.is-tv .hourly-item:focus-visible { border-radius: 12px; }
        html.is-tv .btn:focus-visible,
        html.is-tv .search-input:focus-visible { border-radius: 28px; }

        /* ── Lunar Block ── */
        .moon-block {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .moon-visual {
            flex-shrink: 0;
            width: 72px;
            height: 72px;
            position: relative;
        }
        .moon-visual svg {
            display: block;
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 10px rgba(240, 240, 245, 0.08));
        }
        .moon-info {
            flex: 1;
        }
        .moon-phase-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }
        .moon-illumination {
            font-size: 13px;
            color: var(--text-muted);
        }
        .moon-age {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }
    </style>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "ArCast",
      "url": "https://ardalorn.github.io/ArTools/ArCast/",
      "description": "ArCast is a calm, accessible weather dashboard for the UK. Search by postcode or device location for a live hourly forecast (temperature, precipitation chance, wind speed, sky conditions) sourced from Open-Meteo, alongside a daily moon phase and illumination reading calculated client-side.",
      "applicationCategory": "WeatherApplication",
      "operatingSystem": "Any modern web browser",
      "browserRequirements": "Requires JavaScript",
      "isAccessibleForFree": true,
      "author": {
        "@type": "Person",
        "name": "Ardalorn"
      }
    }
    </script>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-title">
                <h1>ArCast</h1>
                <p>Let's take a look at how the weather is shaping up.</p>
            </div>
            <div class="controls-wrapper">
                <input type="text" id="locationInput" class="search-input" placeholder="Optional UK postcode..." aria-label="Enter UK postcode" autocomplete="postal-code">
                <button class="btn btn-primary" id="searchBtn" onclick="window.handleSearch()" aria-label="Search weather by postcode">
                    <span id="searchBtnText">Check weather</span>
                    <span id="searchSpinner" class="spinner" aria-hidden="true"></span>
                </button>
                <button class="btn" id="geoBtn" onclick="window.handleGeolocation()" aria-label="Use my current location" title="Use my current location">
                    <span id="geoBtnText">📍 Near Me</span>
                    <span id="geoSpinner" class="spinner" aria-hidden="true"></span>
                </button>
            </div>
            <div id="statusMessage" class="status-message" role="status" aria-live="polite"></div>
        </header>
        <main id="mainScreen">
            <noscript>
                <div style="padding:40px 20px;max-width:600px;margin:0 auto;color:var(--text-secondary);line-height:1.7;">
                    <h2 style="color:var(--text);font-size:22px;margin-bottom:16px;">About ArCast</h2>
                    <p style="margin-bottom:12px;">ArCast is a calm, accessible weather dashboard built for the UK. Enter a UK postcode, or share your location, and it pulls a live hourly forecast — temperature, precipitation chance, wind speed, and sky conditions — from the Open-Meteo weather API, with postcode lookups handled by postcodes.io.</p>
                    <p style="margin-bottom:12px;">Alongside the forecast, ArCast shows the current moon phase and illumination percentage for each day, calculated locally without any extra API calls.</p>
                    <p style="margin-bottom:12px;">The dashboard automatically adapts for TV and Google TV browsers, with larger touch targets and remote-friendly keyboard navigation.</p>
                    <p style="font-size:20px;color:var(--text);margin-top:24px;">⚠️ This page requires JavaScript to fetch and display live forecast data. Please enable JavaScript in your browser settings to use ArCast.</p>
                </div>
            </noscript>

            <div id="emptyState">
                <p style="color: var(--text-muted); margin: 0;">Enter a postcode or tap "Near Me" to grab the forecast.</p>
            </div>
            <div id="tabsContainer">
                <nav id="tabsHeader" role="tablist" aria-label="Daily weather tabs"></nav>
                <div id="tabsContent"></div>
            </div>
        </main>
    </div>
    <script>
        (function() {
            'use strict';
            const CONFIG = {
                CACHE_KEY: 'arcast_cache_v1',
                APP_VERSION: '3.0.0',
                CACHE_EXPIRY_MS: 3600000,
                DEFAULT_LAT: 51.5,
                DEFAULT_LON: -2.0,
                MAX_RETRIES: 3,
                RETRY_BASE_DELAY_MS: 500,
                GEO_TIMEOUT_MS: 10000,
                GEO_MAX_AGE_MS: 60000,
                COORD_MATCH_THRESHOLD: 0.01,
                WIND_CONVERSION_FACTOR: 0.621371
            };
            function detectTV() {
                const ua = navigator.userAgent.toLowerCase();
                const isTVUA = /android.*tv|crkey|smart-tv|googletv|appletv|hbbtv|tizen|webos.+tv|tv\s+build|vidaa|netcast|playstation|xbox/.test(ua);
                const isCoarsePointer = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
                const isNoPointer = window.matchMedia && window.matchMedia('(pointer: none)').matches;
                const isLargeScreen = window.screen && (window.screen.width >= 1280 || window.screen.height >= 720);
                const noTouch = !('ontouchstart' in window);
                return isTVUA || (isLargeScreen && noTouch && (isCoarsePointer || isNoPointer));
            }

            function initTVMode() {
                if (!detectTV()) return;
                document.documentElement.classList.add('is-tv');
                const geoBtn = getElement('geoBtn');
                if (geoBtn) geoBtn.style.display = 'none';
            }

            function handleTVKeys(e) {
                if (!document.documentElement.classList.contains('is-tv')) return;
                const active = document.activeElement;
                if (!active) return;

                if (e.key === 'ArrowRight' && active.classList.contains('hourly-item')) {
                    e.preventDefault();
                    const next = active.nextElementSibling;
                    if (next && next.classList.contains('hourly-item')) {
                        next.focus();
                        next.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                    }
                }
                if (e.key === 'ArrowLeft' && active.classList.contains('hourly-item')) {
                    e.preventDefault();
                    const prev = active.previousElementSibling;
                    if (prev && prev.classList.contains('hourly-item')) {
                        prev.focus();
                        prev.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
                    }
                }
                if (e.key === 'Backspace' || e.key === 'BrowserBack' || e.keyCode === 8 || e.keyCode === 461) {
                    if (active.classList.contains('hourly-item') || active.classList.contains('tab-button')) {
                        e.preventDefault();
                        getElement('locationInput').focus();
                    }
                }
            }

            document.addEventListener('keydown', handleTVKeys);

            const userLocale = navigator.language || 'en-GB';
            const userTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
            const appState = {
                weatherData: null,
                allDays: [],
                currentDay: null,
                isLoading: false,
                intersectionObserver: null,
                lastCoords: null,
                asyncUpdateToken: 0
            };
            const getElement = function(id) { return document.getElementById(id); };
            const searchBtn = getElement('searchBtn');
            const searchBtnText = getElement('searchBtnText');
            const searchSpinner = getElement('searchSpinner');
            const geoBtn = getElement('geoBtn');
            const geoBtnText = getElement('geoBtnText');
            const geoSpinner = getElement('geoSpinner');
            const statusEl = getElement('statusMessage');
            const emptyState = getElement('emptyState');
            const tabsContainer = getElement('tabsContainer');
            const tabsHeader = getElement('tabsHeader');
            const tabsContent = getElement('tabsContent');
            function showStatus(msg, type) {
                statusEl.textContent = msg;
                statusEl.className = 'status-message show status-' + type;
            }
            function clearStatus() {
                statusEl.classList.remove('show');
                statusEl.textContent = '';
            }
            function setLoading(loading, type) {
                appState.isLoading = loading;
                if (type === 'search' || type === 'both') {
                    searchBtn.disabled = loading;
                    searchSpinner.style.display = loading ? 'inline-block' : 'none';
                    searchBtnText.textContent = loading ? 'Searching...' : 'Check weather';
                }
                if (type === 'geo' || type === 'both') {
                    geoBtn.disabled = loading;
                    geoSpinner.style.display = loading ? 'inline-block' : 'none';
                    geoBtnText.textContent = loading ? 'Locating...' : '📍 Near Me';
                }
            }
            function sanitizeInput(str) {
                return str.replace(/[^a-zA-Z0-9 ]/g, '').trim().toUpperCase();
            }
            function formatTime(timeStr, tz) {
                return new Date(timeStr).toLocaleTimeString(userLocale, {
                    timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: false
                });
            }
            function getIconForCode(code) {
                if (code === 0) return '☀️';
                if (code === 1 || code === 2) return '🌤️';

                    '<div class="block">' +
                        '<div class="block-label">Hourly snapshot</div>' +
                        '<div class="scroll-track" role="region" aria-label="Hourly timeline">' +
                            trackHtml +
                        '</div>' +
                    '</div>' +
                    buildMoonHtml(day)
                );
                container.appendChild(view);
                if (appState.intersectionObserver) appState.intersectionObserver.observe(view);
                autoScrollTimeline(view);
                const track = view.querySelector('.scroll-track');
                if (track) enableDragScroll(track);
            }
            window.addEventListener('offline', function() {
                showStatus('You are offline. Showing cached data if available.', 'offline');
                attemptStaleFallback();
            });
            window.addEventListener('online', function() {
                clearStatus();
                if (!appState.weatherData) showStatus('Back online!', 'loading');
            });
            document.addEventListener('visibilitychange', function() {
                if (document.visibilityState === 'visible' && appState.lastCoords) {
                    const cachedInstance = loadFromCache();
                    if (!cachedInstance || Date.now() - cachedInstance.timestamp > CONFIG.CACHE_EXPIRY_MS) {
                        fetchForecastData(appState.lastCoords).catch(function() {});
                    }
                }
            });
            initTVMode();

                        const initialCached = loadFromCache();
            if (initialCached) {
                appState.weatherData = initialCached.data;
                appState.lastCoords = initialCached.coords;
                processAndRenderData();
                searchBtnText.textContent = 'Refresh forecast';
            }
            if (!navigator.onLine) {
                showStatus('You are offline. Showing cached data if available.', 'offline');
                attemptStaleFallback();
            }
            window.handleSearch = handleSearch;
            window.handleGeolocation = handleGeolocation;
        })();
    </script>
</body>
</html>
